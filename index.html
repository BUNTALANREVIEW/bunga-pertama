<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💖 Love Rain - Surat Cinta 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0e1a2a 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', 'Poppins', monospace;
            position: relative;
        }

        .matrix-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255, 50, 100, 0.03) 0px, rgba(255, 50, 100, 0.03) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 1;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 2;
        }

        /* Pesan muncul satu per satu - CENTER, hanya FADE saja */
        .story-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .story-message {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 16px 32px;
            max-width: 85%;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff99bb;
            text-shadow: 0 0 8px #ff3366;
            border: 1.5px solid rgba(255, 51, 102, 0.7);
            box-shadow: 0 0 30px rgba(255,51,102,0.3);
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .story-message.show {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .story-message {
                font-size: 1rem;
                padding: 12px 22px;
                white-space: normal;
                line-height: 1.4;
                max-width: 90%;
            }
        }

        /* Tombol pertanyaan - CENTER */
        .proposal-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 25;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s ease;
        }

        .proposal-wrapper.show {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .proposal-wrapper.hide {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .question-text {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 14px 32px;
            border-radius: 60px;
            margin-bottom: 30px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff99bb;
            text-shadow: 0 0 10px #ff3366;
            border: 2px solid #ff3366;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            white-space: nowrap;
            animation: pulseText 1.5s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255,51,102,0.3);
        }

        @keyframes pulseText {
            0% { transform: scale(1); text-shadow: 0 0 5px #ff3366; }
            50% { transform: scale(1.05); text-shadow: 0 0 25px #ff6699; }
            100% { transform: scale(1); text-shadow: 0 0 5px #ff3366; }
        }

        @media (max-width: 550px) {
            .question-text {
                font-size: 1.1rem;
                padding: 10px 24px;
                white-space: normal;
                text-align: center;
                margin-bottom: 25px;
            }
        }

        .proposal-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 60px;
            padding: 12px 24px;
            color: white;
            letter-spacing: 1px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff3366, #ff6680);
            font-size: 1.4rem;
            padding: 15px 35px;
            box-shadow: 0 0 20px #ff3366;
        }

        .btn-no {
            background: #2a2a3a;
            border: 1px solid #ff6680;
            color: #ffaaaa;
            font-size: 1.1rem;
            padding: 12px 28px;
        }

        @media (max-width: 550px) {
            .btn-yes { font-size: 1.1rem; padding: 12px 25px; }
            .btn-no { font-size: 0.9rem; padding: 10px 20px; }
            .proposal-box { gap: 20px; }
        }

        /* Pesan sukses */
        .success-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            padding: 25px 45px;
            border-radius: 60px;
            color: #ff99bb;
            font-size: 1.8rem;
            font-weight: bold;
            z-index: 100;
            border: 2px solid #ff3366;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 0 50px rgba(255,51,102,0.5);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .success-msg.show {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 550px) {
            .success-msg { font-size: 1.1rem; padding: 18px 30px; white-space: normal; width: 85%; text-align: center; }
        }

        /* Tombol kontrol musik */
        .music-control {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 30;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            gap: 10px;
            align-items: center;
            border: 1px solid rgba(255,51,102,0.5);
            cursor: pointer;
            transition: 0.2s;
        }
        .music-control:hover {
            background: rgba(0,0,0,0.8);
            transform: scale(1.02);
        }
        .music-control span {
            color: #ff99bb;
            font-size: 12px;
            font-family: monospace;
        }
        .music-control .music-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="matrix-overlay"></div>
<canvas id="loveCanvas"></canvas>

<div class="story-container" id="storyContainer">
    <div class="story-message" id="storyMessage"></div>
</div>

<!-- Tombol pertanyaan -->
<div class="proposal-wrapper" id="proposalWrapper">
    <div class="question-text">💖 MAU GAK JADI PACAR AKU? 💖</div>
    <div class="proposal-box" id="proposalBox">
        <button class="btn btn-yes" id="btnYes">💖 IYAA MAU 💖</button>
        <button class="btn btn-no" id="btnNo">❌ Enggak</button>
    </div>
</div>

<!-- Pesan sukses -->
<div class="success-msg" id="successMsg">
    💖 YEEAYY MAUUU! 💖<br>
    <span style="font-size:0.7rem;">❤️ I LOVE YOU ❤️</span>
</div>

<!-- Tombol kontrol musik -->
<div class="music-control" id="musicControl">
    <span class="music-icon">🎵</span>
    <span id="musicStatus">Music ON</span>
</div>

<script>
    (function() {
        // ========== AUDIO / LAGU DARI LOKAL ==========
        const audio = new Audio('lagu.mp3');
        audio.loop = true;
        audio.volume = 0.5;
        
        let musicPlaying = false;
        const musicControl = document.getElementById('musicControl');
        const musicStatus = document.getElementById('musicStatus');
        
        function autoPlayMusic() {
            audio.play().then(() => {
                musicPlaying = true;
                musicStatus.innerHTML = 'Music ON 🎵';
            }).catch((err) => {
                musicStatus.innerHTML = '🔇 Klik Play';
                const tryPlayOnInteraction = () => {
                    audio.play().then(() => {
                        musicPlaying = true;
                        musicStatus.innerHTML = 'Music ON 🎵';
                        document.removeEventListener('click', tryPlayOnInteraction);
                        document.removeEventListener('touchstart', tryPlayOnInteraction);
                    }).catch(() => {});
                };
                document.addEventListener('click', tryPlayOnInteraction);
                document.addEventListener('touchstart', tryPlayOnInteraction);
            });
        }
        
        musicControl.addEventListener('click', (e) => {
            e.stopPropagation();
            if (musicPlaying) {
                audio.pause();
                musicPlaying = false;
                musicStatus.innerHTML = 'Music OFF 🔇';
            } else {
                audio.play().then(() => {
                    musicPlaying = true;
                    musicStatus.innerHTML = 'Music ON 🎵';
                }).catch(() => {
                    musicStatus.innerHTML = '🔇 Klik Play';
                });
            }
        });
        
        autoPlayMusic();
        
        // ========== CANVAS LOVE JATUH (MAX 50, AWAL 40, TIDAK NAMBAH) ==========
        const canvas = document.getElementById('loveCanvas');
        const ctx = canvas.getContext('2d');
        let loves = [];
        let animationId = null;
        let HEART_COUNT = 40; // AWAL 40 LOVE
        const MAX_HEARTS = 50; // MAKSIMAL 50 LOVE - TIDAK BISA NAMBAH LAGI
        
        let width, height;
        const loveColors = ['#ff3366', '#ff5577', '#ff7799', '#ff99bb', '#ff1a53', '#e6005c', '#ff0066', '#ff4d6d'];
        const heartSymbols = ['❤️', '💖', '💗', '💓', '💕', '💞', '♥', '💘', '❣️'];
        
        class FallingLove {
            constructor(x, y, speed, size, symbol, color, opacity, rotationSpeed) {
                this.x = x; this.y = y; this.speed = speed; this.size = size;
                this.symbol = symbol; this.color = color; this.opacity = opacity;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = rotationSpeed;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.015 + Math.random() * 0.02;
                this.wobbleAmount = 0.5 + Math.random() * 1.5;
            }
            update() {
                this.y += this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * this.wobbleAmount * 0.2;
                this.rotation += this.rotationSpeed;
                if (this.y > height + this.size * 2) {
                    this.y = -this.size * 2;
                    this.x = Math.random() * width;
                    this.speed = 1.0 + Math.random() * 3;
                    if (Math.random() < 0.2) this.symbol = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                }
                if (this.x < -this.size) this.x = width + this.size;
                if (this.x > width + this.size) this.x = -this.size;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", "Courier New", monospace`;
                ctx.shadowBlur = 3;
                ctx.shadowColor = `rgba(255, 50, 100, 0.4)`;
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.fillText(this.symbol, 0, 0);
                ctx.restore();
            }
        }
        
        function initLoves(count) {
            const arr = [];
            const maxCount = Math.min(count, MAX_HEARTS);
            for (let i = 0; i < maxCount; i++) {
                arr.push(new FallingLove(
                    Math.random() * width,
                    Math.random() * height * 1.5 - height * 0.5,
                    0.8 + Math.random() * 3,
                    12 + Math.random() * 22,
                    heartSymbols[Math.floor(Math.random() * heartSymbols.length)],
                    loveColors[Math.floor(Math.random() * loveColors.length)],
                    0.5 + Math.random() * 0.5,
                    (Math.random() - 0.5) * 0.025
                ));
            }
            return arr;
        }
        
        function updateLoves() { for (let love of loves) love.update(); }
        
        function drawLoves() {
            ctx.fillStyle = 'rgba(10, 15, 30, 0.25)';
            ctx.fillRect(0, 0, width, height);
            for (let love of loves) love.draw(ctx);
        }
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            if (loves.length === 0) loves = initLoves(HEART_COUNT);
            else {
                for (let love of loves) {
                    if (love.x > width) love.x = width - 20;
                    if (love.x < 0) love.x = 20;
                    if (love.y > height + 100) love.y = -love.size;
                }
            }
        }
        
        function animate() {
            updateLoves();
            drawLoves();
            animationId = requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        loves = initLoves(HEART_COUNT);
        animate();
        
        // ========== PESAN MUNCUL SATU SATU (LAMBAT + FADE SAJA) ==========
const messages = [
    "hai kamu 🙂",
    "ini bunga pertama dari aku buat kamu",
    "semoga kamu suka ya",
    "nggak yang gimana-gimana sih, cuma pengen ngasih aja",
    "aku cuma mau bilang sesuatu",
    "aku seneng bisa kenal kamu",
    "makasih ya udah nemenin aku selama ini",
    "walaupun kita lagi jauh sekarang",
    "aku tetap kepikiran kamu di sini",
    "semoga kamu selalu baik-baik aja ya di sana",
    "pelan-pelan aja, kita jalanin ini",
    "aku di sini, tetep buat kamu",
    "jaga diri baik-baik ya",
    "🙂"
];
        
        let messageIndex = 0;
        let isMessageAnimating = false;
        const storyMessageDiv = document.getElementById('storyMessage');
        const storyContainer = document.getElementById('storyContainer');
        const proposalWrapper = document.getElementById('proposalWrapper');
        const successMsg = document.getElementById('successMsg');
        
        const MESSAGE_DURATION = 4000;
        
        function showNextMessage() {
            if (isMessageAnimating) return;
            
            if (messageIndex < messages.length) {
                isMessageAnimating = true;
                
                storyMessageDiv.textContent = messages[messageIndex];
                storyMessageDiv.classList.remove('show');
                void storyMessageDiv.offsetWidth;
                storyMessageDiv.classList.add('show');
                
                messageIndex++;
                
                setTimeout(() => {
                    storyMessageDiv.classList.remove('show');
                    setTimeout(() => {
                        isMessageAnimating = false;
                        if (messageIndex < messages.length) {
                            showNextMessage();
                        } else {
                            finishStoryAndShowProposal();
                        }
                    }, 800);
                }, MESSAGE_DURATION);
            } else {
                finishStoryAndShowProposal();
            }
        }
        
        function finishStoryAndShowProposal() {
            storyContainer.style.transition = "opacity 0.8s ease";
            storyContainer.style.opacity = "0";
            setTimeout(() => {
                storyContainer.style.display = "none";
                // HILANGKAN SEMUA LOVE BIAR GA LAG SAAT TOMBOL MUNCUL
                loves = [];
                loves = initLoves(HEART_COUNT);
                proposalWrapper.classList.add('show');
            }, 800);
        }
        
        // ========== LOGIKA TOMBOL (TANPA NAMBAH LOVE) ==========
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        let noClickCount = 0;
        let isAnswered = false;
        
        function updateButtons() {
            if (isAnswered) return;
            noClickCount++;
            const scaleNo = Math.max(0.2, 0.9 - (noClickCount * 0.12));
            const scaleYes = Math.min(1.7, 1 + (noClickCount * 0.12));
            btnNo.style.transform = `scale(${scaleNo})`;
            btnNo.style.opacity = Math.max(0.3, 1 - (noClickCount * 0.1));
            btnYes.style.transform = `scale(${scaleYes})`;
            btnYes.style.fontSize = `${Math.min(1.9, 1.4 + (noClickCount * 0.06))}rem`;
            if (noClickCount >= 7) {
                btnNo.style.pointerEvents = 'none';
                btnNo.style.opacity = '0.2';
                btnNo.innerText = '😭';
            }
        }
        
        btnNo.addEventListener('click', (e) => {
            e.preventDefault();
            if (isAnswered) return;
            updateButtons();
            btnNo.style.animation = 'shakeAnim 0.2s ease-in-out 0s 2';
            setTimeout(() => btnNo.style.animation = '', 400);
        });
        
        btnYes.addEventListener('click', () => {
            if (isAnswered) return;
            isAnswered = true;
            
            proposalWrapper.classList.add('hide');
            proposalWrapper.classList.remove('show');
            
            setTimeout(() => {
                successMsg.classList.add('show');
                
                setTimeout(() => {
                    successMsg.classList.remove('show');
                }, 4000);
            }, 350);
        });
        
        const styleShake = document.createElement('style');
        styleShake.textContent = `@keyframes shakeAnim { 0% { transform: translateX(0px); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } 100% { transform: translateX(0px); } }`;
        document.head.appendChild(styleShake);
        
        // Mulai pesan setelah 1 detik
        setTimeout(() => {
            showNextMessage();
        }, 1000);
    })();
</script>
</body>
</html>
